<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Image Gallery</h1>
    </header>

    <div class="filter-buttons">
        <button onclick="filterImages('all')">All</button>
        <button onclick="filterImages('nature')">Nature</button>
        <button onclick="filterImages('animals')">Animals</button>
    </div>

    <div class="gallery">

        <div class="image nature">
            <img src="images/img1.jpg" alt="" onclick="openLightbox(0)">
        </div>

        <div class="image animals">
            <img src="images/img2.jpg" alt="" onclick="openLightbox(1)">
        </div>

        <div class="image nature">
            <img src="images/img3.jpg" alt="" onclick="openLightbox(2)">
        </div>

        <div class="image animals">
            <img src="images/img4.jpg" alt="" onclick="openLightbox(3)">
        </div>

        <div class="image nature">
            <img src="images/img5.jpg" alt="" onclick="openLightbox(4)">
        </div>

        <div class="image animals">
            <img src="images/img6.jpg" alt="" onclick="openLightbox(5)">
        </div>

    </div>

    <!-- Lightbox -->

    <div id="lightbox">
        <span class="close" onclick="closeLightbox()">×</span>

        <button class="prev" onclick="changeSlide(-1)">❮</button>

        <img id="lightbox-img">

        <button class="next" onclick="changeSlide(1)">❯</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
